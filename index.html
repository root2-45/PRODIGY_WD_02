        let timer = null;

        function formatTime(value) {
            return value < 10 ? `0${value}` : value;
        }

        function updateDisplay() {
            hours.textContent = formatTime(hour);

            ms++;
            
            if (ms === 100) {
                ms = 0;
                sec++;
                
                if (sec === 60) {
                    sec = 0;
                    min++;
                    
                    if (min === 60) {
                        min = 0;
                        hour++;
                        
                        if (hour === 24) {

                <button id="pauseBtn" class="btn btn-pause" disabled>⏸ PAUSE</button>

            </div>

            <div class="lap-section">
                <div class="lap-header">
                    <h3>📋 LAP HISTORY <span class="lap-stats" id="lapCountDisplay">0 laps</span></h3>
                    <button id="clearLapsBtn" class="btn-clear">🗑️ CLEAR ALL</button>
                </div>
                <div class="lap-list-container">
                    <ul id="lapList" class="lap-list">
                        <li class="empty-lap">No laps recorded yet</li>
                    </ul>
                </div>
            </div>

            <div class="keyboard-hints">
                <span>␣ SPACE → START/PAUSE</span>
                <span>R → RESET</span>
                <span>L → LAP</span>
            </div>
        </div>

    <script>
        // DOM Elements
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const millisecondsEl = document.getElementById('milliseconds');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapBtn = document.getElementById('lapBtn');
        const lapList = document.getElementById('lapList');
        const clearLapsBtn = document.getElementById('clearLapsBtn');
        const lapCountDisplay = document.getElementById('lapCountDisplay');

        // Timer variables
        let timer = null;
        let running = false;
        let h = 0, m = 0, s = 0, ms = 0;
        
        // Lap storage - PERSISTENT (doesn't clear on reset)
        let allLaps = [];  // Stores all laps ever recorded
        let sessionLapCount = 1;
        let lastLapTime = 0;
        let globalLapCounter = 1;

        // Helper functions
        function pad(num) {
            return num < 10 ? '0' + num : num;
        }

        function padMs(num) {
            return num < 10 ? '0' + num : num;
        }

        function updateDisplay() {
            hoursEl.textContent = pad(h);
            minutesEl.textContent = pad(m);
            secondsEl.textContent = pad(s);
            millisecondsEl.textContent = padMs(ms);
        }

        function getTimeString() {
            return `${pad(h)}:${pad(m)}:${pad(s)}.${padMs(ms)}`;
        }

        function getTotalMs() {
            return (h * 3600000) + (m * 60000) + (s * 1000) + ms;
        }

        // Update lap count display
        function updateLapCountDisplay() {
            lapCountDisplay.textContent = `${allLaps.length} laps`;
        }

        // Render all laps from storage
        function renderAllLaps() {
            if (allLaps.length === 0) {
                lapList.innerHTML = '<li class="empty-lap">No laps recorded yet</li>';
            } else {
                lapList.innerHTML = '';
                // Display in reverse order (newest first)
                [...allLaps].reverse().forEach(lap => {
                    const lapItem = document.createElement('li');
                    lapItem.innerHTML = `
                        <span class="lap-number">LAP ${lap.number}</span>
                        <span class="lap-time">${lap.time}</span>
                        <span class="lap-diff">${lap.diff}</span>
                    `;
                    lapList.appendChild(lapItem);
                });
            }
            updateLapCountDisplay();
        }

        // Timer function
        function timerTick() {
            ms += 10;
            
            if (ms >= 1000) {
                ms = 0;
                s++;
                
                if (s >= 60) {
                    s = 0;
                    m++;
                    
                    if (m >= 60) {
                        m = 0;
                        h++;
                    }
                }
            }
            
            updateDisplay();
        }

        // Start stopwatch
        function startTimer() {
            if (!running) {
                timer = setInterval(timerTick, 10);
                running = true;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
            }
        }

        // Pause stopwatch
        function pauseTimer() {
            if (running) {
                clearInterval(timer);
                running = false;
                startBtn.disabled = false;
                pauseBtn.disabled = true;
            }
        }

        // Reset stopwatch - BUT KEEP LAPS SAVED
        function resetTimer() {
            // Stop timer if running
            if (running) {
                clearInterval(timer);
                running = false;
            }
            
            // Reset time values to zero
            h = 0;
            m = 0;
            s = 0;
            ms = 0;
            updateDisplay();
            
            // Reset button states
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            
            // Reset session lap tracking variables
            sessionLapCount = 1;
            lastLapTime = 0;
            
            // IMPORTANT: We do NOT clear allLaps array here!
            // Laps are preserved
            
            console.log("Stopwatch reset - Laps preserved: " + allLaps.length);
        }

        // Record lap - SAVES PERMANENTLY
        function recordLap() {
            // Don't record if stopwatch hasn't started
            if (!running && h === 0 && m === 0 && s === 0 && ms === 0) {
                console.log("Start the stopwatch first!");
                return;
            }
            
            // Get current time
            const currentTime = getTimeString();
            const currentMs = getTotalMs();
            
            // Calculate difference from last lap in this session
            let diffText = '';
            if (lastLapTime === 0) {
                diffText = '+0.00s';
            } else {
                const diffMs = currentMs - lastLapTime;
                const diffSec = (diffMs / 1000).toFixed(2);
                diffText = `+${diffSec}s`;
            }
            
            // Store lap permanently
            const lapData = {
                number: globalLapCounter,
                time: currentTime,
                diff: diffText,
                timestamp: new Date().getTime()
            };
            
            allLaps.push(lapData);
            
            // Update for next lap
            lastLapTime = currentMs;
            sessionLapCount++;
            globalLapCounter++;
            
            // Re-render all laps
            renderAllLaps();
            
            console.log(`Lap ${lapData.number} saved! Total laps: ${allLaps.length}`);
            
            // Auto-scroll to show new lap
            if (lapList.firstChild) {
                lapList.firstChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Clear all laps (only when user clicks CLEAR ALL)
        function clearAllLaps() {
            if (confirm('Are you sure you want to delete ALL lap history?')) {
                allLaps = [];
                globalLapCounter = 1;
                sessionLapCount = 1;
                lastLapTime = 0;
                renderAllLaps();
                console.log("All laps cleared");
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (running) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                resetTimer();
            } else if (e.code === 'KeyL') {
                e.preventDefault();
                recordLap();
            }
        });

        // Event listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        lapBtn.addEventListener('click', recordLap);
        clearLapsBtn.addEventListener('click', clearAllLaps);

        // Initialize
        updateDisplay();
        renderAllLaps();
        console.log("Stopwatch ready - Laps are SAVED even after Reset!");
    </script>
</body>
</html>
